name: 🛸 Daily Radar L0 Scout (Find Mutants)

on:
  # 每天北京时间凌晨 3 点 (UTC 19:00) 自动触发
  schedule:
    - cron: '0 19 * * *'
  # 允许在 GitHub 网页上手动点击按钮触发
  workflow_dispatch:

jobs:
  scout_and_plant:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # 只拉取最新提交，提升速度

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🚜 Run L0 Excavator (Find Mutants)
        # 支持任何兼容 OpenAI 格式的大模型（DeepSeek, 通义千问, Kimi等）
        run: python scripts/scout_l0_advanced.py
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      - name: 📤 Commit and Push New Mutants
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/categories.json
          # 检查是否有文件改动，如果有就自动推送到 GitHub
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "🤖 Auto-Scout: 发现新的智能硬件变异品种"
            git push
            echo "✅ 成功向云端投递了新的硬件变异词！"
          else
            echo "😴 今夜挖掘机没有找到新的变异品种，安心睡觉。"
          fi
